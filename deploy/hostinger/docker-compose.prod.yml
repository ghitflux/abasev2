version: "3.9"

# ============================================================
# ABASE v2 — Docker Compose de PRODUÇÃO
# ============================================================
# Uso:
#   docker compose -f deploy/hostinger/docker-compose.prod.yml \
#     --env-file /opt/ABASE/env/.env.production up -d
#
# Para Hostinger Docker Manager:
#   - Compose File: deploy/hostinger/docker-compose.prod.yml
#   - Env File: /opt/ABASE/env/.env.production
#   - Serviço de borda pública: nginx (portas 80 e 443)
# ============================================================

networks:
  abase-net:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_media:
    driver: local
  backend_static:
    driver: local

services:

  # ── MySQL 8.0 ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: abase-mysql-prod
    restart: unless-stopped
    networks:
      - abase-net
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-abase_v2}
      MYSQL_USER: ${MYSQL_USER:-abase}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - /opt/ABASE/data/db:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_allowed_packet=64M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Banco NÃO exposto ao host por segurança

  # ── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: abase-redis-prod
    restart: unless-stopped
    networks:
      - abase-net
    volumes:
      - redis_data:/data
      - /opt/ABASE/data/redis:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Redis NÃO exposto ao host por segurança

  # ── Backend Django (Gunicorn) ─────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: deploy/hostinger/Dockerfile.backend
    image: abase-backend-prod:latest
    container_name: abase-backend-prod
    restart: unless-stopped
    networks:
      - abase-net
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DATABASE_NAME: ${DATABASE_NAME:-abase_v2}
      DATABASE_USER: ${DATABASE_USER:-abase}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: mysql
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      JWT_ACCESS_TOKEN_LIFETIME: ${JWT_ACCESS_TOKEN_LIFETIME:-2880}
      JWT_REFRESH_TOKEN_LIFETIME: ${JWT_REFRESH_TOKEN_LIFETIME:-10080}
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
      - /opt/ABASE/data/media:/app/media
      - /opt/ABASE/data/static:/app/staticfiles
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Host: abasepiaui.com' http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Backend NÃO exposto ao host — acesso via nginx interno

  # ── Celery Worker ─────────────────────────────────────────
  celery:
    build:
      context: ../..
      dockerfile: deploy/hostinger/Dockerfile.backend
    image: abase-backend-prod:latest
    container_name: abase-celery-prod
    restart: unless-stopped
    networks:
      - abase-net
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency", "2"]
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.production}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DATABASE_NAME: ${DATABASE_NAME:-abase_v2}
      DATABASE_USER: ${DATABASE_USER:-abase}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: mysql
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    volumes:
      - backend_media:/app/media
      - /opt/ABASE/data/media:/app/media
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend Next.js ──────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: deploy/hostinger/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://abasepiaui.com/api/v1}
        NODE_ENV: production
    image: abase-frontend-prod:latest
    container_name: abase-frontend-prod
    restart: unless-stopped
    networks:
      - abase-net
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000/api/v1}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://abasepiaui.com/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Frontend NÃO exposto ao host — acesso via nginx interno

  # ── Nginx (borda pública) ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: abase-nginx-prod
    restart: unless-stopped
    networks:
      - abase-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/app/staticfiles:ro
      - backend_media:/app/media:ro
      - /opt/ABASE/data/static:/app/staticfiles:ro
      - /opt/ABASE/data/media:/app/media:ro
      - /opt/ABASE/data/certbot/conf:/etc/letsencrypt:ro
      - /opt/ABASE/data/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
