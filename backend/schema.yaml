        Histórico de parcelas descontadas (pagas) do associado logado.
        Simula o endpoint legado /api/app/antecipacao/historico.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/app/documentos/:
    post:
      operationId: v1_app_documentos_create
      description: |-
        Upload de documento pelo próprio associado para resolver pendência.
        Multipart: tipo, arquivo, observacao (opcional).
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/app/me/:
    get:
      operationId: v1_app_me_retrieve
      description: |-
        Retorna os dados consolidados do associado logado:
        dados pessoais, contratos resumidos, resumo financeiro e pendências.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/app/mensalidades/:
    get:
      operationId: v1_app_mensalidades_retrieve
      description: Lista ciclos com parcelas do associado logado, agrupados por contrato.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/app/pendencias/:
    get:
      operationId: v1_app_pendencias_retrieve
