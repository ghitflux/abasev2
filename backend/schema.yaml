components:
  schemas:
    AdminUserAccessUpdate:
      type: object
      properties:
        roles:
          type: array
          items:
            type: string
            maxLength: 30
        is_active:
          type: boolean
    AdminUserList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        full_name:
          type: string
          readOnly: true
        primary_role:
          type: string
          nullable: true
          readOnly: true
        roles:
          type: array
          items:
            type: string
          readOnly: true
        is_active:
          type: boolean
        must_set_password:
          type: boolean
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
          title: Último login
        is_current_user:
          type: boolean
          readOnly: true
      required:
      - email
      - first_name
      - full_name
      - id
      - is_current_user
      - primary_role
      - roles
    AgentePagamentoCiclo:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        numero:
          type: integer
          readOnly: true
        data_inicio:
          type: string
          format: date
          readOnly: true
        data_fim:
          type: string
          format: date
          readOnly: true
        status:
          type: string
          readOnly: true
        status_visual_slug:
          type: string
          readOnly: true
        status_visual_label:
          type: string
          readOnly: true
        valor_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        parcelas:
          type: array
          items:
            $ref: '#/components/schemas/AgentePagamentoParcela'
          readOnly: true
      required:
      - data_fim
      - data_inicio
      - id
      - numero
      - parcelas
      - status
      - status_visual_label
      - status_visual_slug
      - valor_total
    AgentePagamentoComprovante:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        nome:
          type: string
          readOnly: true
        url:
          type: string
          readOnly: true
        arquivo_referencia:
          type: string
          readOnly: true
        arquivo_disponivel_localmente:
          type: boolean
          readOnly: true
        tipo_referencia:
          type: string
          readOnly: true
        origem:
          type: string
          readOnly: true
        papel:
          type: string
          readOnly: true
        tipo:
          type: string
          readOnly: true
        status:
          type: string
          readOnly: true
        competencia:
          type: string
          format: date
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - arquivo_disponivel_localmente
      - arquivo_referencia
      - competencia
      - created_at
      - id
      - nome
      - origem
      - papel
      - status
      - tipo
      - tipo_referencia
      - url
    AgentePagamentoContrato:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        associado_id:
          type: integer
          readOnly: true
        nome:
          type: string
          readOnly: true
        cpf_cnpj:
          type: string
          readOnly: true
        contrato_codigo:
          type: string
          readOnly: true
        status_contrato:
          type: string
          readOnly: true
        status_visual_slug:
          type: string
          readOnly: true
        status_visual_label:
          type: string
          readOnly: true
        data_contrato:
          type: string
          format: date
        auxilio_liberado_em:
          type: string
          format: date
          nullable: true
        pagamento_inicial_status:
          type: string
          readOnly: true
        pagamento_inicial_status_label:
          type: string
          readOnly: true
        pagamento_inicial_valor:
          type: string
          readOnly: true
        pagamento_inicial_paid_at:
