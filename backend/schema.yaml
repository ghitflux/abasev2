          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAssociadoUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAssociadoUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssociadoUpdate'
          description: ''
    delete:
