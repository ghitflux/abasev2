      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/associados/:
    get:
      operationId: v1_associados_list
      parameters:
      - in: query
        name: agente
        schema:
          type: number
        description: Filtrar por ID do agente responsável
      - in: query
        name: cpf_cnpj
        schema:
          type: string
        description: Busca parcial por CPF/CNPJ
      - in: query
        name: data_cadastro_fim
        schema:
          type: string
          format: date
      - in: query
        name: data_cadastro_inicio
        schema:
          type: string
          format: date
      - in: query
        name: matricula
        schema:
          type: string
      - in: query
        name: nome
        schema:
          type: string
        description: Busca parcial por nome
      - name: ordering
        required: false
        in: query
        description: Qual campo usar ao ordenar os resultados.
        schema:
          type: string
      - in: query
        name: orgao_publico
        schema:
          type: string
        description: Filtrar por órgão público
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Número de resultados a serem retornados por página.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Um termo de busca.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - ativo
          - cadastrado
          - em_analise
          - inadimplente
          - inativo
          - pendente
        description: |-
          Filtrar por status do associado

          * `cadastrado` - Cadastrado
          * `em_analise` - Em análise
          * `ativo` - Ativo
          * `pendente` - Pendente
          * `inativo` - Inativo
          * `inadimplente` - Inadimplente
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssociadoListList'
          description: ''
    post:
      operationId: v1_associados_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssociadoCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AssociadoCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AssociadoCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssociadoCreate'
          description: ''
